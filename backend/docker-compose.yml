services:
  postgres:
    image: postgres:16
    container_name: glovo_clone_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: glovo_clone
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
